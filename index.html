<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindSync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000;
  --s1:rgba(28,28,30,1);
  --s2:rgba(44,44,46,1);
  --accent:#0A84FF;
  --accent2:#5E5CE6;
  --green:#30D158;
  --text:#fff;
  --t2:rgba(255,255,255,.6);
  --t3:rgba(255,255,255,.35);
  --sep:rgba(255,255,255,.1);
  --r:20px;
  --r2:14px;
}
html{height:100%;background:#000;}
body{
  height:100dvh;min-height:100%;
  background:#000;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;position:fixed;width:100%;
}

/* glow */
.glow{
position:fixed;inset:0;pointer-events:none;z-index:0;
background:
radial-gradient(ellipse 70% 45% at 15% 8%,rgba(10,132,255,.22) 0%,transparent 65%),
radial-gradient(ellipse 55% 40% at 85% 92%,rgba(48,209,88,.14) 0%,transparent 65%),
radial-gradient(ellipse 60% 50% at 50% 50%,rgba(94,92,230,.07) 0%,transparent 70%);
}

#app{position:relative;height:100dvh;width:100%;overflow:hidden;z-index:1;}

/* screens */
.screen{
position:absolute;inset:0;
display:flex;flex-direction:column;
padding:
calc(env(safe-area-inset-top,44px) + 20px)
20px
calc(env(safe-area-inset-bottom,20px) + 24px);
opacity:0;transform:translateY(30px) scale(.97);
pointer-events:none;
transition:opacity .38s cubic-bezier(.4,0,.2,1),transform .38s cubic-bezier(.4,0,.2,1);
}
.screen.show{opacity:1;transform:none;pointer-events:all;}
.screen.out{opacity:0;transform:translateY(-16px) scale(1.01);transition-duration:.25s;}

/* ── JOIN ── */
#s-join{justify-content:flex-end;}

.logo-area{
position:absolute;top:0;left:0;right:0;
display:flex;flex-direction:column;align-items:center;
padding-top:calc(env(safe-area-inset-top,44px) + 60px);
pointer-events:none;
}
.logo-box{
width:84px;height:84px;
background:linear-gradient(145deg,var(–accent),var(–accent2));
border-radius:22px;
display:flex;align-items:center;justify-content:center;
box-shadow:0 20px 50px rgba(10,132,255,.45),0 0 0 1px rgba(255,255,255,.12) inset;
margin-bottom:18px;
}
.logo-box svg{width:44px;height:44px;}
.logo-name{
font-size:36px;font-weight:700;letter-spacing:-.7px;
background:linear-gradient(160deg,#fff 40%,rgba(255,255,255,.6));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-tag{font-size:15px;color:var(–t2);margin-top:5px;}

.form-card{
background:var(–s1);border-radius:var(–r);
border:1px solid var(–sep);overflow:hidden;
margin-bottom:12px;
}
.field{display:flex;flex-direction:column;padding:14px 18px 12px;}
.field+.field{border-top:1px solid var(–sep);}
.field label{font-size:11px;font-weight:600;color:var(–t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.field input{
background:transparent;border:none;outline:none;
color:var(–text);font-size:17px;font-family:inherit;
-webkit-appearance:none;caret-color:var(–accent);
}
.field input::placeholder{color:rgba(255,255,255,.25);}
#roomInp{text-transform:uppercase;letter-spacing:.1em;font-weight:600;}

.btn{
width:100%;padding:17px;border-radius:var(–r2);
border:none;outline:none;
font-size:17px;font-weight:600;font-family:inherit;
cursor:pointer;letter-spacing:-.2px;
-webkit-appearance:none;
transition:opacity .12s,transform .12s;
position:relative;overflow:hidden;
}
.btn:active{opacity:.8;transform:scale(.97);}
.btn:disabled{opacity:.35;transform:none!important;cursor:default;}
.btn-blue{background:var(–accent);color:#fff;box-shadow:0 6px 20px rgba(10,132,255,.38);}
.btn-ghost{background:var(–s2);color:var(–accent);}

.hint{text-align:center;font-size:12px;color:rgba(255,255,255,.28);margin-top:14px;line-height:1.5;}

/* ── QUESTION ── */
#s-question{justify-content:space-between;}

.q-top{display:flex;align-items:center;justify-content:space-between;padding-top:2px;}
.q-chip{
background:rgba(10,132,255,.15);color:var(–accent);
font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
padding:5px 12px;border-radius:100px;
}
.q-of{font-size:13px;color:var(–t3);font-weight:500;}

.q-center{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 8px;}
#qText{
font-size:28px;font-weight:700;text-align:center;line-height:1.22;letter-spacing:-.45px;
background:linear-gradient(150deg,#fff 35%,rgba(255,255,255,.68));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.q-bottom{}

/* typing */
.type-row{height:20px;display:flex;align-items:center;padding-left:2px;margin-bottom:10px;}
#typeEl{
display:flex;align-items:center;gap:7px;
font-size:13px;color:var(–t2);
opacity:0;transform:translateY(3px);
transition:opacity .22s,transform .22s;
}
#typeEl.on{opacity:1;transform:none;}
.bubbles{display:flex;gap:3px;align-items:center;}
.bubbles i{
display:block;width:5px;height:5px;border-radius:50%;
background:var(–accent);font-style:normal;
animation:bbl 1.1s ease-in-out infinite;
}
.bubbles i:nth-child(2){animation-delay:.18s;}
.bubbles i:nth-child(3){animation-delay:.36s;}
@keyframes bbl{0%,80%,100%{transform:scale(.7);opacity:.45;}40%{transform:scale(1);opacity:1;}}

/* answer area */
.ans-wrap{
background:var(–s1);border-radius:var(–r);
border:1px solid var(–sep);overflow:hidden;
transition:border-color .18s,box-shadow .18s;
}
.ans-wrap.glow-focus{border-color:rgba(10,132,255,.5);box-shadow:0 0 0 3px rgba(10,132,255,.13);}
#ansInp{
display:block;width:100%;
padding:16px 18px 8px;
background:transparent;border:none;outline:none;
color:var(–text);font-size:17px;font-family:inherit;
resize:none;min-height:88px;max-height:130px;
caret-color:var(–accent);-webkit-appearance:none;
}
#ansInp::placeholder{color:rgba(255,255,255,.25);}
.ans-foot{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 12px;}
#charEl{font-size:12px;color:rgba(255,255,255,.28);}
.send{
width:38px;height:38px;border-radius:50%;
background:var(–accent);border:none;outline:none;
display:flex;align-items:center;justify-content:center;
cursor:pointer;
box-shadow:0 3px 12px rgba(10,132,255,.45);
transition:opacity .13s,transform .13s;
flex-shrink:0;
}
.send:active{opacity:.8;transform:scale(.88);}
.send:disabled{opacity:.28;transform:none;cursor:default;box-shadow:none;}
.send svg{width:16px;height:16px;fill:#fff;}

.wait{
text-align:center;padding:16px 0 0;
font-size:14px;color:var(–t2);letter-spacing:-.1px;
display:none;
}
.wait.on{display:block;}

/* ── RESULT ── */
#s-result{justify-content:space-between;}

.res-head{text-align:center;padding-top:4px;}
.res-head h2{font-size:12px;font-weight:600;color:var(–t3);text-transform:uppercase;letter-spacing:.1em;}
.res-label{font-size:24px;font-weight:700;letter-spacing:-.35px;margin-top:6px;}

/* ring */
.ring-wrap{display:flex;justify-content:center;margin:2px 0;}
.ring-rel{position:relative;width:168px;height:168px;}
.ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.rtrack{fill:none;stroke:rgba(255,255,255,.08);stroke-width:9;}
#pRing{
fill:none;stroke:url(#rg);stroke-width:9;stroke-linecap:round;
stroke-dasharray:471;stroke-dashoffset:471;
transition:stroke-dashoffset .04s linear;
}
.ring-mid{
position:absolute;inset:0;
display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#scoreNum{font-size:44px;font-weight:700;letter-spacing:-1.5px;}
.ring-sub{font-size:11px;color:var(–t2);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}

/* cards */
.cards{display:flex;flex-direction:column;gap:10px;flex:1;margin:0 0 14px;}
.card{
flex:1;background:var(–s1);
border-radius:var(–r);border:1px solid var(–sep);
padding:14px 18px;
}
.card-who{font-size:11px;font-weight:700;color:var(–t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.card-txt{font-size:19px;font-weight:500;line-height:1.3;letter-spacing:-.2px;}

/* shake */
@keyframes shk{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.shake{animation:shk .35s ease;}
</style>

</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, off } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyA2dbln4SU5tcxgekWt_kUkoz6rBmMhLk4",
  authDomain:"mindsync-5aea1.firebaseapp.com",
  databaseURL:"https://mindsync-5aea1-default-rtdb.firebaseio.com",
  projectId:"mindsync-5aea1",
  storageBucket:"mindsync-5aea1.firebasestorage.app",
  messagingSenderId:"419028983975",
  appId:"1:419028983975:web:9ba60800901961d731fb82"
};
const db = getDatabase(initializeApp(cfg));

let player="", room="", qIdx=0;
let typRef=null, ansRef=null;

const Qs = [
  "Describe our love in one word.",
  "What's one thing you secretly admire about me?",
  "Where does our future take us?",
  "What feeling do only I give you?",
  "Describe our best memory in three words.",
  "What's something you wish I knew about you?",
  "If we were a song, what genre?",
  "What does comfort feel like with me?",
];

// ─── screens ─────────────────────────────────────
function show(id){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("show","out");
    if(s.id!==id) s.classList.add("out");
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById(id).classList.add("show");
  }));
}

// ─── join ─────────────────────────────────────────
const joinBtn = document.getElementById("joinBtn");
const nameInp = document.getElementById("nameInp");
const roomInp = document.getElementById("roomInp");

joinBtn.addEventListener("click", ()=>{
  player = nameInp.value.trim();
  room   = roomInp.value.trim().toUpperCase();
  if(!player){ shake(nameInp.closest(".field")); return; }
  if(!room)  { shake(roomInp.closest(".field")); return; }
  qIdx=0;
  show("s-question");
  loadQ();
  listen();
});

nameInp.addEventListener("keydown", e=>{ if(e.key==="Enter") roomInp.focus(); });
roomInp.addEventListener("keydown", e=>{ if(e.key==="Enter") joinBtn.click(); });

// ─── question ─────────────────────────────────────
const qText   = document.getElementById("qText");
const qOf     = document.getElementById("qOf");
const ansInp  = document.getElementById("ansInp");
const ansWrap = document.getElementById("ansWrap");
const charEl  = document.getElementById("charEl");
const sendBtn = document.getElementById("sendBtn");
const waitEl  = document.getElementById("waitEl");
const typeEl  = document.getElementById("typeEl");
const typeWho = document.getElementById("typeWho");

function loadQ(){
  qText.textContent = Qs[qIdx % Qs.length];
  qOf.textContent   = (qIdx % Qs.length + 1) + " of " + Qs.length;
  ansInp.value = "";
  charEl.textContent = "0 / 80";
  ansInp.style.height = "auto";
  sendBtn.disabled = false;
  ansWrap.style.display = "block";
  waitEl.classList.remove("on");
  typeEl.classList.remove("on");
}

ansInp.addEventListener("input", ()=>{
  const n = ansInp.value.length;
  charEl.textContent = n + " / 80";
  ansInp.style.height = "auto";
  ansInp.style.height = Math.min(ansInp.scrollHeight, 130) + "px";
  if(room) set(ref(db, room+"/typing"), n>0 ? player : null);
});

ansInp.addEventListener("focus",  ()=> ansWrap.classList.add("glow-focus"));
ansInp.addEventListener("blur",   ()=> ansWrap.classList.remove("glow-focus"));

sendBtn.addEventListener("click", ()=>{
  const a = ansInp.value.trim();
  if(!a) return;
  sendBtn.disabled = true;
  ansWrap.style.display = "none";
  waitEl.classList.add("on");
  set(ref(db, room+"/answers/"+player), a);
  set(ref(db, room+"/typing"), null);
});

// ─── firebase ─────────────────────────────────────
function listen(){
  if(typRef){ off(typRef); typRef=null; }
  if(ansRef){ off(ansRef); ansRef=null; }

  typRef = ref(db, room+"/typing");
  onValue(typRef, snap=>{
    const v = snap.val();
    if(v && v!==player){
      typeWho.textContent = v+" is thinking\u2026";
      typeEl.classList.add("on");
    } else {
      typeEl.classList.remove("on");
    }
  });

  ansRef = ref(db, room+"/answers");
  onValue(ansRef, snap=>{
    const d = snap.val();
    if(d && Object.keys(d).length>=2) showResult(d);
  });
}

// ─── result ───────────────────────────────────────
const resLabel = document.getElementById("resLabel");
const scoreNum = document.getElementById("scoreNum");
const pRing    = document.getElementById("pRing");
const c1n = document.getElementById("c1n");
const c1a = document.getElementById("c1a");
const c2n = document.getElementById("c2n");
const c2a = document.getElementById("c2a");
const nextBtn = document.getElementById("nextBtn");

const TAGS = [[90,"Inseparable \uD83D\uDCAB"],[80,"Deeply Connected \uD83D\uDC99"],[70,"Strong Bond \uD83D\uDD25"],[0,"Growing Together \uD83C\uDF31"]];

function showResult(d){
  if(typRef){ off(typRef); typRef=null; }
  if(ansRef){ off(ansRef); ansRef=null; }

  const ps = Object.keys(d);
  const score = Math.floor(Math.random()*28)+72;
  const tag = TAGS.find(([m])=>score>=m)[1];

  c1n.textContent = ps[0];
  c1a.textContent = "\u201c"+d[ps[0]]+"\u201d";
  c2n.textContent = ps[1];
  c2a.textContent = "\u201c"+d[ps[1]]+"\u201d";
  resLabel.textContent = tag;

  show("s-result");
  animRing(score);

  const h = JSON.parse(localStorage.getItem("msh")||"[]");
  h.push({score,date:new Date().toISOString()});
  localStorage.setItem("msh",JSON.stringify(h));
}

function animRing(target){
  const circ = 2*Math.PI*75; // ~471.2
  pRing.style.strokeDasharray = circ;
  pRing.style.strokeDashoffset = circ;
  scoreNum.textContent = "0%";
  let cur=0;
  const step=target/55;
  const iv = setInterval(()=>{
    cur = Math.min(cur+step, target);
    scoreNum.textContent = Math.floor(cur)+"%";
    pRing.style.strokeDashoffset = circ-(cur/100)*circ;
    if(cur>=target) clearInterval(iv);
  },16);
}

nextBtn.addEventListener("click", ()=>{
  remove(ref(db, room));
  qIdx++;
  show("s-question");
  loadQ();
  listen();
});

// ─── util ─────────────────────────────────────────
function shake(el){
  el.classList.add("shake");
  el.addEventListener("animationend",()=>el.classList.remove("shake"),{once:true});
}

// boot
show("s-join");
</script>

</body>
</html>

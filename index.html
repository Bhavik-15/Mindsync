<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MindSync v3 Fixed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
--pink:#ff375f;
--purple:#bf5af2;
--glass:rgba(255,255,255,.06);
}

body{
height:100dvh;
background:#000;
font-family:-apple-system;
color:#fff;
/* FIXED: removed overflow hidden */
overflow:auto;
}

/* background */
#bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,55,95,.25),transparent),
radial-gradient(circle at 80% 80%,rgba(191,90,242,.25),transparent);
z-index:0;
pointer-events:none;
}

/* app */
#app{
position:relative;
z-index:2;
}

/* screen */
.screen{
position:absolute;
inset:0;
padding:
calc(env(safe-area-inset-top)+20px)
20px
calc(env(safe-area-inset-bottom)+20px);
display:flex;
flex-direction:column;
justify-content:space-between;
opacity:0;
transform:translateY(20px);
transition:.4s;
}
.screen.show{opacity:1;transform:none}

/* card */
.card{
background:var(--glass);
backdrop-filter:blur(20px);
border-radius:24px;
padding:16px;
}

/* button */
.btn{
padding:16px;
border:none;
border-radius:20px;
font-size:17px;
font-weight:600;
background:linear-gradient(135deg,var(--pink),var(--purple));
color:#fff;
}

/* title */
.title{
font-size:36px;
font-weight:700;
text-align:center;
background:linear-gradient(135deg,var(--pink),var(--purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* inputs FIX */
input,textarea{
width:100%;
background:transparent;
border:none;
color:#fff;
font-size:16px; /* IMPORTANT for iPhone */
outline:none;
pointer-events:auto;
user-select:text;
-webkit-user-select:text;
}

/* question */
#qText{
font-size:26px;
text-align:center;
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
}

/* typing */
#typing{
font-size:13px;
opacity:.6;
margin-bottom:6px;
}

/* send */
.send{
width:44px;height:44px;
border-radius:50%;
background:linear-gradient(135deg,var(--pink),var(--purple));
display:flex;align-items:center;justify-content:center;
}

/* result */
#score{
font-size:52px;
text-align:center;
font-weight:700;
}
#tag{
text-align:center;
margin-top:8px;
font-size:18px;
opacity:.8;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="app">

<!-- JOIN -->
<div class="screen show" id="join">
<div></div>

<div>
<div class="title">MindSync</div>

<div class="card" style="margin-top:20px">
<input id="name" placeholder="Your name">
<input id="room" placeholder="Room code" style="margin-top:10px">
</div>
</div>

<button class="btn" id="start">Enter Room ♡</button>
</div>

<!-- QUESTION -->
<div class="screen" id="question">

<div id="qText"></div>

<div>
<div id="typing"></div>

<div class="card">
<textarea id="ans" rows="1" maxlength="100" placeholder="Type your answer..."></textarea>

<div style="display:flex;justify-content:flex-end;margin-top:10px">
<div class="send" id="send">➤</div>
</div>
</div>
</div>

</div>

<!-- RESULT -->
<div class="screen" id="result">

<div></div>

<div>
<div id="score">0%</div>
<div id="tag"></div>
</div>

<button class="btn" id="next">Next ♡</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

/* FIREBASE */
const db = getDatabase(initializeApp({
apiKey: "AIzaSyA2dbln4SU5tcxgekWt_kUkoz6rBmMhLk4",
authDomain: "mindsync-5aea1.firebaseapp.com",
databaseURL: "https://mindsync-5aea1-default-rtdb.firebaseio.com",
projectId: "mindsync-5aea1",
storageBucket: "mindsync-5aea1.firebasestorage.app",
messagingSenderId: "419028983975",
appId: "1:419028983975:web:9ba60800901961d731fb82"
}));

let player="",room="",q=0;

const Qs=[
"Describe our love in one word ❤️",
"What makes you feel safe with me?",
"What is our perfect date?",
"What do you admire secretly about me?",
"Where should we travel together?",
"What reminds you of me instantly?"
];

/* NAV */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

/* JOIN */
start.onclick=()=>{
player=name.value.trim();
room=room.value.trim().toUpperCase();
if(!player||!room)return alert("Enter details");
show("question");
loadQ();
listen();
};

/* LOAD */
function loadQ(){
qText.textContent=Qs[q%Qs.length];
ans.value="";
}

/* typing */
ans.oninput=()=>{
set(ref(db,room+"/typing"),player);
setTimeout(()=>set(ref(db,room+"/typing"),null),1000);
};

/* send */
send.onclick=()=>{
if(!ans.value)return;
set(ref(db,room+"/answers/"+player),ans.value);
};

/* listen */
function listen(){

onValue(ref(db,room+"/typing"),snap=>{
let v=snap.val();
typing.textContent=(v && v!==player)? v+" is typing..." : "";
});

onValue(ref(db,room+"/answers"),snap=>{
const d=snap.val();
if(d && Object.keys(d).length>=2){
showResult(d);
}
});

}

/* smart score */
function calcScore(a,b){
a=a.toLowerCase();b=b.toLowerCase();
let match=0;
a.split(" ").forEach(w=>{
if(b.includes(w))match++;
});
return Math.min(95,60+match*10);
}

/* result */
function showResult(d){
show("result");

let p=Object.keys(d);
let score=calcScore(d[p[0]],d[p[1]]);

let tag=
score>90?"Soulmates 💞":
score>80?"Deep Love ❤️":
score>70?"Strong Bond 🔥":
"Growing Together 🌱";

animateScore(score);
tagEl.innerText=tag;

/* history */
let h=JSON.parse(localStorage.getItem("ms_v3")||"[]");
h.push(score);
localStorage.setItem("ms_v3",JSON.stringify(h));
}

/* animation */
function animateScore(target){
let cur=0;
let i=setInterval(()=>{
cur+=2;
scoreEl.innerText=cur+"%";
if(cur>=target)clearInterval(i);
},20);
}

/* next */
next.onclick=()=>{
remove(ref(db,room));
q++;
show("question");
loadQ();
};

/* refs */
const scoreEl=document.getElementById("score");
const tagEl=document.getElementById("tag");

/* EXTRA FIX (iPhone tap) */
name.addEventListener("click",()=>name.focus());
room.addEventListener("click",()=>room.focus());

</script>

</body>
</html>

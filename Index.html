<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

  
  const firebaseConfig = {
    apiKey: "AIzaSyA2dbln4SU5tcxgekWt_kUkoz6rBmMhLk4",
    authDomain: "mindsync-5aea1.firebaseapp.com",
    databaseURL: "https://mindsync-5aea1-default-rtdb.firebaseio.com",
    projectId: "mindsync-5aea1",
    storageBucket: "mindsync-5aea1.firebasestorage.app",
    messagingSenderId: "419028983975",
    appId: "1:419028983975:web:9ba60800901961d731fb82"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── State ─────────────────────────────────────────────
  let player = "", roomCode = "", qIndex = 0;

  // ── Questions ─────────────────────────────────────────
  const questions = [
    "Describe our love in one word.",
    "What's one thing you secretly admire about me?",
    "Where does our future take us?",
    "What feeling do only I give you?",
    "Describe our best memory in three words.",
    "What's something you wish I knew about you?",
    "If we were a song, which genre?",
    "What does comfort feel like with me?",
  ];

  function getQuestion() {
    return questions[qIndex % questions.length];
  }

  // ── Screens ───────────────────────────────────────────
  const screens = document.querySelectorAll(".screen");

  function showScreen(id) {
    screens.forEach(s => {
      s.classList.remove("active", "exit");
      if (s.id !== id) s.classList.add("exit");
    });
    requestAnimationFrame(() => {
      document.getElementById(id).classList.add("active");
    });
  }

  // ── Join ──────────────────────────────────────────────
  window.join = function () {
    const nameEl = document.getElementById("nameInput");
    const roomEl = document.getElementById("roomInput");
    player = nameEl.value.trim();
    roomCode = roomEl.value.trim().toUpperCase();
    if (!player || !roomCode) {
      shake(nameEl.parentElement);
      return;
    }
    showScreen("screen-question");
    loadQuestion();
    listenRoom();
  };

  function loadQuestion() {
    document.getElementById("questionText").textContent = getQuestion();
    document.getElementById("answerInput").value = "";
    document.getElementById("charCount").textContent = "0 / 80";
    document.getElementById("typingIndicator").textContent = "";
    document.getElementById("sendBtn").disabled = false;
  }

  // ── Typing indicator ──────────────────────────────────
  document.getElementById("answerInput").addEventListener("input", function () {
    const len = this.value.length;
    document.getElementById("charCount").textContent = len + " / 80";
    if (len > 0) {
      set(ref(db, roomCode + "/typing"), player + " is thinking…");
    } else {
      set(ref(db, roomCode + "/typing"), null);
    }
  });

  // ── Send ──────────────────────────────────────────────
  window.send = function () {
    const ans = document.getElementById("answerInput").value.trim();
    if (!ans) return;
    document.getElementById("sendBtn").disabled = true;
    document.getElementById("sendBtn").textContent = "Waiting…";
    set(ref(db, roomCode + "/answers/" + player), ans);
    set(ref(db, roomCode + "/typing"), null);
  };

  // ── Listen ────────────────────────────────────────────
  function listenRoom() {
    onValue(ref(db, roomCode + "/typing"), snap => {
      const val = snap.val();
      const el = document.getElementById("typingIndicator");
      if (val && !val.startsWith(player)) {
        el.textContent = val;
        el.classList.add("visible");
      } else {
        el.classList.remove("visible");
      }
    });

    onValue(ref(db, roomCode + "/answers"), snap => {
      const data = snap.val();
      if (data && Object.keys(data).length >= 2) {
        showResult(data);
      }
    });
  }

  // ── Result ────────────────────────────────────────────
  function showResult(data) {
    const players = Object.keys(data);
    const a1 = data[players[0]];
    const a2 = data[players[1]];
    const score = Math.floor(Math.random() * 30) + 70;

    document.getElementById("p1name").textContent = players[0];
    document.getElementById("p1ans").textContent = '\u201c' + a1 + '\u201d';
    document.getElementById("p2name").textContent = players[1];
    document.getElementById("p2ans").textContent = '\u201c' + a2 + '\u201d';

    showScreen("screen-result");
    animateScore(score);
    saveHistory(score);
  }

  function animateScore(target) {
    const el = document.getElementById("scoreNumber");
    const ring = document.getElementById("progressRing");
    const circumference = 2 * Math.PI * 54;
    ring.style.strokeDasharray = circumference;
    let current = 0;
    const step = target / 60;
    const interval = setInterval(() => {
      current = Math.min(current + step, target);
      el.textContent = Math.floor(current) + "%";
      const offset = circumference - (current / 100) * circumference;
      ring.style.strokeDashoffset = offset;
      if (current >= target) clearInterval(interval);
    }, 16);
  }

  // ── Next ──────────────────────────────────────────────
  window.next = function () {
    remove(ref(db, roomCode));
    qIndex++;
    showScreen("screen-question");
    loadQuestion();
    document.getElementById("sendBtn").textContent = "Send";
  };

  // ── History ───────────────────────────────────────────
  function saveHistory(score) {
    const history = JSON.parse(localStorage.getItem("ms_history") || "[]");
    history.push({ score, date: new Date().toISOString(), room: roomCode });
    localStorage.setItem("ms_history", JSON.stringify(history));
  }

  // ── Utils ─────────────────────────────────────────────
  function shake(el) {
    el.classList.add("shake");
    el.addEventListener("animationend", () => el.classList.remove("shake"), { once: true });
  }

  // Init
  showScreen("screen-join");
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000;
    --surface: rgba(28,28,30,0.95);
    --surface2: rgba(44,44,46,0.9);
    --accent: #0A84FF;
    --accent-soft: rgba(10,132,255,0.15);
    --green: #30D158;
    --text: #FFFFFF;
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.3);
    --separator: rgba(255,255,255,0.08);
    --radius: 22px;
    --radius-sm: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }

  /* ── App shell ── */
  #app {
    position: relative;
    height: 100%;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    overflow: hidden;
  }

  /* ── Ambient background ── */
  #app::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(10,132,255,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(48,209,88,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,55,95,0.06) 0%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Screens ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding:
      calc(var(--safe-top) + 20px)
      24px
      calc(var(--safe-bottom) + 24px);
    opacity: 0;
    transform: translateY(32px) scale(0.98);
    pointer-events: none;
    transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1),
                transform 0.45s cubic-bezier(0.4,0,0.2,1);
    z-index: 1;
  }
  .screen.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }
  .screen.exit {
    opacity: 0;
    transform: translateY(-20px) scale(1.01);
  }

  /* ── Join Screen ── */
  #screen-join {
    justify-content: center;
    gap: 0;
  }

  .brand {
    text-align: center;
    margin-bottom: 52px;
  }

  .brand-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, var(--accent), #5E5CE6);
    border-radius: 18px;
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 40px rgba(10,132,255,0.35);
  }

  .brand-icon svg {
    width: 38px;
    height: 38px;
    fill: white;
  }

  .brand h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .brand p {
    font-size: 15px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 400;
  }

  .form-group {
    margin-bottom: 12px;
  }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 1px solid var(--separator);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.2);
  }

  .input-wrap input {
    width: 100%;
    padding: 16px 18px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 17px;
    font-family: inherit;
    font-weight: 400;
    -webkit-appearance: none;
  }

  .input-wrap input::placeholder {
    color: var(--text-tertiary);
  }

  .input-wrap.room input {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }

  .btn-primary {
    width: 100%;
    padding: 17px;
    border-radius: var(--radius-sm);
    border: none;
    outline: none;
    background: var(--accent);
    color: white;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    -webkit-appearance: none;
    transition: opacity 0.15s, transform 0.15s;
    letter-spacing: -0.2px;
  }

  .btn-primary:active {
    opacity: 0.85;
    transform: scale(0.98);
  }

  .btn-primary:disabled {
    opacity: 0.45;
    cursor: default;
    transform: none;
  }

  .btn-secondary {
    width: 100%;
    padding: 17px;
    border-radius: var(--radius-sm);
    border: none;
    outline: none;
    background: var(--surface2);
    color: var(--accent);
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    -webkit-appearance: none;
    transition: opacity 0.15s, transform 0.15s;
  }

  .btn-secondary:active {
    opacity: 0.75;
    transform: scale(0.98);
  }

  .divider {
    height: 1px;
    background: var(--separator);
    margin: 28px 0;
  }

  /* ── Question Screen ── */
  #screen-question {
    justify-content: space-between;
  }

  .q-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 8px;
  }

  .q-pill {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .q-room {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .q-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 0;
  }

  #questionText {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    line-height: 1.25;
    letter-spacing: -0.4px;
  }

  .q-footer {}

  .typing-row {
    height: 20px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
  }

  #typingIndicator {
    font-size: 13px;
    color: var(--text-secondary);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.25s, transform 0.25s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #typingIndicator.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #typingIndicator::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  .answer-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--separator);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .answer-wrap:focus-within {
    border-color: rgba(10,132,255,0.5);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.15);
  }

  #answerInput {
    width: 100%;
    padding: 18px 20px 10px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 17px;
    font-family: inherit;
    font-weight: 400;
    resize: none;
    min-height: 100px;
    max-height: 140px;
    -webkit-appearance: none;
  }

  #answerInput::placeholder { color: var(--text-tertiary); }

  .answer-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
  }

  #charCount {
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .send-inline {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    outline: none;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    flex-shrink: 0;
  }

  .send-inline:active { opacity: 0.8; transform: scale(0.9); }
  .send-inline:disabled { opacity: 0.35; cursor: default; transform: none; }

  .send-inline svg {
    width: 18px;
    height: 18px;
    fill: white;
  }

  /* ── Result Screen ── */
  #screen-result {
    justify-content: space-between;
  }

  .result-header {
    text-align: center;
    padding-top: 16px;
  }

  .result-header h2 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: -0.1px;
  }

  .result-header p {
    font-size: 14px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  .score-ring-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 24px 0;
  }

  .ring-svg {
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: rgba(255,255,255,0.07);
    stroke-width: 7;
  }

  #progressRing {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 7;
    stroke-linecap: round;
    stroke-dashoffset: 339.3;
    transition: stroke-dashoffset 0.05s linear;
  }

  .ring-label {
    position: absolute;
    text-align: center;
  }

  .ring-label-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #scoreNumber {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .score-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .answers-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--separator);
    overflow: hidden;
    flex: 1;
    margin-bottom: 16px;
  }

  .answer-row {
    padding: 18px 20px;
  }

  .answer-row + .answer-row {
    border-top: 1px solid var(--separator);
  }

  .answer-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .answer-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.35;
    letter-spacing: -0.2px;
  }

  /* ── Shake ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* ── Footer note ── */
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 20px;
  }
</style>

</head>
